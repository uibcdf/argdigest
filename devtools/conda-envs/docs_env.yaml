channels:
  - uibcdf
  - conda-forge

dependencies:
  # --- Python base ---
  - python=3.13
  - pip

  # --- Documentation with Sphinx and MyST ---
  - sphinx
  - sphinxcontrib-bibtex
  - sphinx-remove-toctrees
  - sphinx-copybutton
  - sphinx-design
  - sphinx-favicon
  - sphinx-tabs
  - pydata-sphinx-theme
  - nbsphinx
  - ipykernel
  - pandoc
  - myst-nb  

  # --- Library dependencies (for autodoc) ---
  - beartype
  - pydantic
  - versioningit
  - pyyaml
  - numpy
  - pandas
  - depdigest
  - smonitor
