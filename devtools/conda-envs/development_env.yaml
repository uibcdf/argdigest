channels:
  - uibcdf
  - conda-forge

dependencies:
  # --- Python base ---
  - python=3.13
  - pip
  - jupyterlab

  # --- Dev tools: formatting, linting, testing ---
  - ruff
  - pytest
  - pytest-cov
  - beartype
  - pydantic
  - versioningit
  - pyyaml
  - numpy
  - pandas
  - smonitor
  - depdigest

  # --- Documentation with Sphinx and MyST ---
  - sphinx
  - pydata-sphinx-theme
  - sphinxcontrib-bibtex
  - sphinx-remove-toctrees
  - sphinx-copybutton
  - sphinx-design
  - sphinx-favicon
  - sphinx-tabs
  - pydata-sphinx-theme
  - nbsphinx
  - ipykernel
  - pandoc
  - myst-nb

